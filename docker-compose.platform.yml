version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://postgres:5432/hyperframes
    depends_on:
      - redis
      - postgres

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    environment:
      - REDIS_HOST=redis
      - PRODUCER_ENABLE_BROWSER_POOL=true
      - PRODUCER_MAX_WORKERS=4
    depends_on:
      - redis

  mcp:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile
    stdin_open: true
    tty: true

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hyperframes
      POSTGRES_USER: hyperframes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  redis_data:
  postgres_data:
  minio_data: