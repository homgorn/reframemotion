name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: docker build --build-arg HYPERFRAMES_VERSION=0.7.60 -t reframemotion:test .
